kind = "web"
previewPath = "/"
title = "Family Finance & Chores"
version = "1.0.0"
id = "artifacts/family-finance"
router = "path"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20311

[services.development]
run = "pnpm --filter @workspace/family-finance run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/family-finance", "run", "build" ]
serve = "static"
publicDir = "artifacts/family-finance/dist/public"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20311"
BASE_PATH = "/"
